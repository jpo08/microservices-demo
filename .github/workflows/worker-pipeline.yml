name: Worker Service - CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
    paths:
      - 'worker/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'worker/**'

env:
  SERVICE: worker
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/microservices-demo-worker
  GO_VERSION: '1.24'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: worker/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./... || true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          # ── EXTERNAL CONFIGURATION STORE PATTERN ──
          # Configuración inyectada externamente via variables de entorno
          # El worker las lee en tiempo de ejecución con os.Getenv()
          KAFKA_BROKER_LIST: ${{ vars.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_TOPIC: ${{ vars.KAFKA_TOPIC }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage
          path: worker/coverage.out

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-w -s -X main.version=${{ github.sha }}" \
            -o worker-binary main.go

  # ─────────────────────────────────────────────
  # JOB 2: Docker Build & Push
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ─────────────────────────────────────────────
  # JOB 3: Integration Test
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Test (Kafka + PostgreSQL)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092

      postgresql:
        image: postgres:15
        env:
          POSTGRES_USER: okteto
          POSTGRES_PASSWORD: okteto
          POSTGRES_DB: votes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Wait for Kafka
        run: bash scripts/wait-for-kafka.sh localhost:9092

      - name: Run integration tests
        working-directory: worker
        run: go test -v -tags=integration ./...
        env:
          KAFKA_BROKER_LIST: localhost:9092
          KAFKA_TOPIC: votes
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: okteto
          POSTGRES_PASSWORD: okteto
          POSTGRES_DB: votes
