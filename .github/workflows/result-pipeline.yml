name: Result Service - CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
    paths:
      - 'result/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'result/**'

env:
  SERVICE: result
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/microservices-demo-result
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build & Test (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: result

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: result/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Run tests
        run: npm test || true
        env:
          # ── EXTERNAL CONFIGURATION STORE PATTERN ──
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          PORT: ${{ vars.RESULT_PORT }}

      - name: Audit for vulnerabilities
        run: npm audit --audit-level=critical || true

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: result
          file: result/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
