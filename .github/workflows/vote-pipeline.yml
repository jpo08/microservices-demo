name: Vote Service - CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
    paths:
      - 'vote/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vote/**'

env:
  SERVICE: vote
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/microservices-demo-vote

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vote

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # ── EXTERNAL CONFIGURATION STORE PATTERN ──
      # Se inyectan variables de entorno desde GitHub Secrets/Variables
      # en lugar de valores hardcodeados en application.properties
      - name: Inject external configuration
        run: |
          echo "Aplicando External Configuration Store pattern..."
          cat > src/main/resources/application.properties << EOF
          spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
          spring.application.name=${APP_NAME:-vote-service}
          server.port=${SERVER_PORT:-8080}
          kafka.topic.votes=${KAFKA_TOPIC:-votes}
          management.endpoints.web.exposure.include=health,info,metrics
          EOF
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ vars.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_TOPIC: ${{ vars.KAFKA_TOPIC }}
          APP_NAME: vote-service

      - name: Build with Maven (skip tests for speed)
        run: mvn clean package -DskipTests -B

      - name: Run unit tests
        run: mvn test -B
        continue-on-error: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vote-test-reports
          path: vote/target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: vote-jar
          path: vote/target/*.jar

  # ─────────────────────────────────────────────
  # JOB 2: Static Analysis & Security Scan
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: vote

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DskipTestScope=true \
            -B || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vote-security-report
          path: vote/target/dependency-check-report.html

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Okteto CLI
        run: curl https://get.okteto.com -sSfL | sh

      - name: Deploy to Okteto Staging
        run: |
          okteto context use ${{ secrets.OKTETO_URL }} --token ${{ secrets.OKTETO_TOKEN }}
          okteto deploy --wait
        env:
          OKTETO_BUILD_VOTE_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh vote ${{ secrets.STAGING_URL }}
